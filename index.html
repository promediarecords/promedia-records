<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Media Records</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0a0a0a;
  color:white;
}

/* HEADER */
header {
  background:#000;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #222;
}

header h1 {
  color:#ff4d00;
  margin:0;
}

nav a {
  color:white;
  margin-left:20px;
  text-decoration:none;
}

/* GRID */
.container {
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap:20px;
}

/* CARD */
.card {
  background:#111;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.03);
}

/* IMAGE FIX */
.image-wrapper {
  position:relative;
}

.card img {
  width:100%;
  height:220px;
  object-fit:cover;
}

/* PLAY BUTTON OVERLAY */
.play-btn {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  background:#ff4d00;
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  opacity:0.9;
}

/* TEXT */
.card-content {
  padding:15px;
}

.artist {
  color:#ff4d00;
  font-size:12px;
}

.title {
  font-size:20px;
  font-weight:bold;
  margin:5px 0;
}

/* PLAYER */
.player {
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  padding:10px;
  border-top:1px solid #222;
}
</style>
</head>

<body>

<header>
  <h1>PRO MEDIA RECORDS</h1>
  <nav>
    <a href="#">Music</a>
    <a href="#">Artists</a>
    <a href="#">Label</a>
    <a href="#">Contact</a>
  </nav>
</header>

<div class="container">
  <div class="grid" id="tracks"></div>
</div>

<div class="player" id="player"></div>

<script>

/* ================= TRACKS ================= */
const TRACKS = [

  // ZIMORA EL
  {
    id: "zimora-tested",
    title: "Tested",
    artist: "Zimora El",
    yt: "ZD_NOu2h9-g",
    cover: "https://img.youtube.com/vi/ZD_NOu2h9-g/maxresdefault.jpg"
  },

  {
    id: "zimora-back-then",
    title: "Back Then",
    artist: "Zimora El",
    yt: "GtpizltPyWI",
    cover: "https://img.youtube.com/vi/GtpizltPyWI/maxresdefault.jpg"
  },

  {
    id: "zimora-tested-audio",
    title: "Tested (Audio)",
    artist: "Zimora El",
    yt: "8ReaZcQYpbA",
    cover: "https://img.youtube.com/vi/8ReaZcQYpbA/maxresdefault.jpg"
  },

  // HOLY FIRE (FIXED)
  {
    id: "holyfire-remember",
    title: "Remember Be Virtual",
    artist: "Holy Fire",
    yt: "BLuTyi-KyVo",
    cover: "https://img.youtube.com/vi/BLuTyi-KyVo/maxresdefault.jpg"
  }

];

/* ================= RENDER ================= */
const tracksDiv = document.getElementById("tracks");
const playerDiv = document.getElementById("player");

TRACKS.forEach(track => {

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <div class="image-wrapper">
      <img src="${track.cover}">
      <div class="play-btn">▶</div>
    </div>

    <div class="card-content">
      <div class="artist">${track.artist}</div>
      <div class="title">${track.title}</div>
    </div>
  `;

  card.onclick = () => playTrack(track);

  tracksDiv.appendChild(card);
});

/* ================= PLAYER ================= */
function playTrack(track){
  playerDiv.innerHTML = `
    <h3>${track.title} - ${track.artist}</h3>
    <iframe width="100%" height="80"
      src="https://www.youtube.com/embed/${track.yt}?autoplay=1"
      frameborder="0"
      allow="autoplay">
    </iframe>
  `;
}

</script>

</body>
</html>
