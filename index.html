<!DOCTYPE html>
<html>
<head>
<title>Pro Media Records</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<div class="text-center text-3xl p-6 text-orange-500 font-bold">
PRO MEDIA RECORDS
</div>

<div class="grid md:grid-cols-3 gap-6 p-6">

<!-- THE WORD -->
<div onclick="play('WBSqVDJfVhw')" class="cursor-pointer border p-4">
<img src="https://img.youtube.com/vi/WBSqVDJfVhw/maxresdefault.jpg">
<h2 class="text-xl">The Word</h2>
<p class="text-sm text-gray-400">Zik Blue ft. Holy Spell</p>

<button onclick="event.stopPropagation(); share('the-word')">Copy Link</button>
<button onclick="event.stopPropagation(); whatsapp('the-word')">WhatsApp</button>
</div>

<!-- TAKE ME DEEPER -->
<div onclick="play('0lB9xV77wmQ')" class="cursor-pointer border p-4">
<img src="https://img.youtube.com/vi/0lB9xV77wmQ/maxresdefault.jpg">
<h2 class="text-xl">Take Me Deeper</h2>
<p class="text-sm text-gray-400">Ziyana Eya</p>

<button onclick="event.stopPropagation(); share('take-me-deeper')">Copy Link</button>
<button onclick="event.stopPropagation(); whatsapp('take-me-deeper')">WhatsApp</button>
</div>

<!-- GLORY & FIRE (NEW FIXED LINK) -->
<div onclick="play('N3SiQLQvrTc')" class="cursor-pointer border p-4">
<img src="https://img.youtube.com/vi/N3SiQLQvrTc/maxresdefault.jpg">
<h2 class="text-xl">Glory & Fire</h2>
<p class="text-sm text-gray-400">Ziyana Eya</p>

<button onclick="event.stopPropagation(); share('glory-fire')">Copy Link</button>
<button onclick="event.stopPropagation(); whatsapp('glory-fire')">WhatsApp</button>
</div>

</div>

<iframe id="player" class="w-full h-96"></iframe>

<script>

const links = {
  "the-word": "WBSqVDJfVhw",
  "take-me-deeper": "0lB9xV77wmQ",
  "glory-fire": "N3SiQLQvrTc"
};

function play(id){
document.getElementById("player").src = "https://www.youtube.com/embed/" + id;
}

function share(id){
const url = window.location.origin + "?track=" + id;
navigator.clipboard.writeText(url);
alert("Song link copied");
}

function whatsapp(id){
const url = window.location.origin + "?track=" + id;
window.open("https://wa.me/?text=" + encodeURIComponent("Listen: " + url));
}

// AUTO LOAD FROM LINK
const params = new URLSearchParams(window.location.search);
const track = params.get("track");

if(track && links[track]){
play(links[track]);
}

</script>

</body>
</html>
